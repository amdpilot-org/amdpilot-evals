name: aiter-mla-reduce-optimize
type: optimize
repo: https://github.com/ROCm/aiter.git
base_image: amdpilot-eval-aiter-mla-reduce-optimize

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_mla_reduce
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "Optimize MLA reduce kernel to reduce attention decode latency"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/aiter-mla-reduce-optimize/task_description.md

stages: auto

max_retries_per_stage: 3
max_total_hours: 3
