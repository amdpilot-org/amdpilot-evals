name: aiter-moe-align-optimize
type: optimize
repo: https://github.com/ROCm/aiter.git
base_image: amdpilot-eval-aiter-moe-align-optimize

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_moe_align
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "Optimize the moe_align_block_size CUDA kernel to reduce shared memory usage and improve throughput"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/aiter-moe-align-optimize/task_description.md

stages: auto

max_retries_per_stage: 3
max_total_hours: 3
