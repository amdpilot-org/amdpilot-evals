name: aiter-bf16-moe-oob-padded
type: bugfix
repo: https://github.com/ROCm/aiter.git
repo_branch: main
base_image: amdpilot-eval-aiter-bf16-moe-oob-padded

container:
  name: amdpilot_eval_bf16_moe_oob
  gpu: "0,1,2,3,4,5,6,7"
  shm_size: 64g
  devices: [/dev/kfd, /dev/dri]
  env:
    TOKENIZERS_PARALLELISM: "false"
    GPU_COREDUMP_ENABLE: "0"
    SGLANG_USE_AITER: "1"
  volumes:
    - "/mnt/dcgpuval/huggingface:/root/.cache/huggingface"
    - "/home/yikzhang/.ssh:/root/.ssh:ro"

workload:
  description: "Fix CK 2-stage MoE kernel OOB access on padded/sentinel rows causing GPU memory fault"
  function: "aiter CK MoE 2-stage GEMM kernel"
  framework: PyTorch

benchmark:
  command: "bash /workspace/bench_bf16_moe.sh"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  output_format: "SCORE: <value>"

task:
  description_file: evals/instances/aiter-bf16-moe-oob-padded/task_description.md

immutable_files:
  - /workspace/bench_bf16_moe.sh
  - /workspace/test_harness.py

stages: auto

max_retries_per_stage: 5
max_total_hours: 12
supervisor: true
nudge: true
frontier_model: true
