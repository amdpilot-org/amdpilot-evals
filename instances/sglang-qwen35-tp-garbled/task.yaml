name: sglang-qwen35-tp-garbled
type: bugfix
repo: https://github.com/sgl-project/sglang.git
base_image: amdpilot-eval-sglang-qwen35-tp-garbled

container:
  name: amdpilot_eval_sglang_qwen35_garbled
  gpu: "0,1,2,3"
  shm_size: 64g
  devices: [/dev/kfd, /dev/dri]
  env:
    TOKENIZERS_PARALLELISM: "false"
    GPU_COREDUMP_ENABLE: "0"
  volumes:
    - "/mnt/dcgpuval/huggingface:/root/.cache/huggingface"

workload:
  description: "Fix garbage output from Qwen3.5-397B-A17B-FP8 with EAGLE speculative decoding on ROCm"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  preflight_timeout: 120

task:
  description_file: /workspace/task_description.md

stages: auto

kimi_cli:
  repo_url: "https://github.com/Arist12/kimi-cli.git"
  branch: amd-dev
  install_dir: "/sgl-workspace/kimi-cli"
  thinking: true
  yolo: true
  ralph_iterations: -1

max_retries_per_stage: 5
max_total_hours: 6
