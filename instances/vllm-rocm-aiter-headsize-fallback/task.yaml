name: vllm-rocm-aiter-headsize-fallback
type: bugfix
repo: https://github.com/vllm-project/vllm.git
base_image: amdpilot-eval-vllm-rocm-aiter-headsize-fallback

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_vllm_rocm_aiter_headsize_fallback
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "AITER paged_attention_v1 ll4mi kernel crashes for head_size < 64, no fallback"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/vllm-rocm-aiter-headsize-fallback/task_description.md

immutable_files:
  - /workspace/test_harness.py
stages: auto
max_retries_per_stage: 3
max_total_hours: 2
