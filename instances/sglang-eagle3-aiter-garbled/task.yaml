name: sglang-eagle3-aiter-garbled
type: bugfix
repo: https://github.com/sgl-project/sglang.git
base_image: amdpilot-eval-sglang-eagle3-aiter-garbled

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_sglang_eagle3_aiter_garbled
  gpu: "0,1,2,3"
  shm_size: 32g
  devices: [/dev/kfd, /dev/dri]
  env:
    TOKENIZERS_PARALLELISM: "false"
    GPU_COREDUMP_ENABLE: "0"
  volumes:
    - "/mnt/dcgpuval/huggingface:/root/.cache/huggingface"

workload:
  description: "Fix EAGLE3 speculative decoding crash and garbled output on aiter backend for non-MLA models"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  preflight_timeout: 120

task:
  description_file: /workspace/task_description.md
  dependency_graph:
    sglang:
      - /sgl-workspace/aiter
      - /sgl-workspace/composable_kernel
    aiter:
      - /sgl-workspace/composable_kernel

immutable_files:
  - /workspace/test_harness.py
stages: auto

kimi_cli:
  repo_url: "https://github.com/Arist12/kimi-cli.git"
  branch: amd-dev
  install_dir: "/sgl-workspace/kimi-cli"
  thinking: true
  yolo: true
  ralph_iterations: -1

max_retries_per_stage: 5
max_total_hours: 6
