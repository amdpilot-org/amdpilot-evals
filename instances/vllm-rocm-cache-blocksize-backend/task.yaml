name: vllm-rocm-cache-blocksize-backend
type: bugfix
repo: https://github.com/vllm-project/vllm.git
base_image: amdpilot-eval-vllm-rocm-cache-blocksize-backend

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_vllm_rocm_cache_blocksize_backend
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "AITER unified attention block_size hardcoded in platform instead of backend-reported"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/vllm-rocm-cache-blocksize-backend/task_description.md

stages: auto
max_retries_per_stage: 3
max_total_hours: 2
