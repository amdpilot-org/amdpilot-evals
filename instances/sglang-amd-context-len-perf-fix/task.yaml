name: sglang-amd-context-len-perf-fix
type: bugfix
repo: https://github.com/sgl-project/sglang.git
base_image: amdpilot-eval-sglang-amd-context-len-perf-fix

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_sglang_amd_context_len_perf_fix
  gpu: "0"
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "See task_description.md"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/sglang-amd-context-len-perf-fix/task_description.md
  dependency_graph:
    sglang:
      - /sgl-workspace/aiter
      - /sgl-workspace/composable_kernel
    aiter:
      - /sgl-workspace/composable_kernel

stages: auto

kimi_cli:
  repo_url: "https://github.com/Arist12/kimi-cli.git"
  branch: amd-dev
  install_dir: "/sgl-workspace/kimi-cli"
  thinking: true
  yolo: true
  ralph_iterations: -1

max_retries_per_stage: 3
max_total_hours: 2
