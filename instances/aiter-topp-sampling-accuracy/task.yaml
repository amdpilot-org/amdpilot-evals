name: aiter-topp-sampling-accuracy
type: bugfix
repo: https://github.com/ROCm/aiter
base_image: amdpilot-eval-aiter-topp-sampling-accuracy

container:
  name: amdpilot_eval_aiter_topp_sampling
  gpu: "0,1"
  shm_size: 64g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "Top-p sampling kernels produce incorrect results under tensor parallelism (TP >= 2)"
  framework: aiter

benchmark:
  command: "/opt/venv/bin/python3 /eval/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  metric_max: 100.0

task:
  description_file: evals/instances/aiter-topp-sampling-accuracy/task_description.md

immutable_files: [test_harness.py]

stages: auto
max_retries_per_stage: 3
max_total_hours: 4
