name: sglang-fp8-w8a8-gfx950-tune
type: bugfix
repo: https://github.com/sgl-project/sglang.git
base_image: amdpilot-eval-sglang-fp8-w8a8-gfx950-tune

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_fp8_w8a8_gfx950_tune
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "FP8 GEMM dispatch missing DeepSeek-V3.2 shape causes accuracy drop on gfx950"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/sglang-fp8-w8a8-gfx950-tune/task_description.md
  dependency_graph:
    sglang:
      - /sgl-workspace/aiter
      - /sgl-workspace/composable_kernel
    aiter:
      - /sgl-workspace/composable_kernel

stages: auto
max_retries_per_stage: 3
max_total_hours: 2
