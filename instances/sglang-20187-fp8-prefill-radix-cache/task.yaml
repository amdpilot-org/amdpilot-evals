name: sglang-20187-fp8-prefill-radix-cache
type: feature
repo: https://github.com/sgl-project/sglang.git
base_image: amdpilot-eval-sglang-20187-fp8-prefill-radix-cache

model_endpoint:
  model: "Qwen/Qwen3.5-397B-A17B"
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_sglang_20187
  gpu: "4"
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "Enable FP8 prefill attention for the radix-cache path"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  preflight_timeout: 120

task:
  description_file: /workspace/task_description.md

stages: auto
supervisor_mode: agent
nudge_agent: oss

kimi_cli:
  repo_url: "https://github.com/Arist12/kimi-cli.git"
  branch: amd-dev
  install_dir: "/sgl-workspace/kimi-cli"
  thinking: true
  yolo: true
  ralph_iterations: -1

max_retries_per_stage: 3
max_total_hours: 4
