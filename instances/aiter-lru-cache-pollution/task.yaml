name: aiter-lru-cache-pollution
type: bugfix
repo: https://github.com/ROCm/aiter.git
base_image: amdpilot-eval-aiter-lru-cache-pollution

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_aiter_lru_cache_pollution
  gpu: "0"
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "LRU-cached GEMM config dict mutated in-place, causing KeyError on second call"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/aiter-lru-cache-pollution/task_description.md

immutable_files:
  - /workspace/test_harness.py
stages: auto
max_retries_per_stage: 3
max_total_hours: 2
