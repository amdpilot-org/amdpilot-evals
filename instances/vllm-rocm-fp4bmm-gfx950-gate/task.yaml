name: vllm-rocm-fp4bmm-gfx950-gate
type: bugfix
repo: https://github.com/vllm-project/vllm.git
base_image: amdpilot-eval-vllm-rocm-fp4bmm-gfx950-gate

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_vllm_rocm_fp4bmm_gfx950_gate
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "FP4BMM enabled by default crashes on MI300X (gfx942) -- missing gfx950 hardware guard"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/vllm-rocm-fp4bmm-gfx950-gate/task_description.md

stages: auto
max_retries_per_stage: 3
max_total_hours: 2
