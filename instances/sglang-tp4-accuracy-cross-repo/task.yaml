name: sglang-tp4-accuracy-cross-repo
type: bugfix
repo: https://github.com/sgl-project/sglang.git
base_image: amdpilot-eval-sglang-tp4-accuracy-cross-repo

container:
  name: amdpilot_eval_sglang_tp4_accuracy
  gpu: "0,1,2,3"
  shm_size: 64g
  devices: [/dev/kfd, /dev/dri]
  env:
    TOKENIZERS_PARALLELISM: "false"
    GPU_COREDUMP_ENABLE: "0"
  volumes:
    - "/mnt/dcgpuval/huggingface:/root/.cache/huggingface"

workload:
  description: "Fix accuracy degradation at TP=4 with MTP on AMD GPUs using aiter attention backend"
  framework: SGLang

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  metric_max: 100.0

task:
  description_file: /workspace/task_description.md
  dependency_graph:
    sglang:
      - /sgl-workspace/aiter
      - /sgl-workspace/composable_kernel
    aiter:
      - /sgl-workspace/composable_kernel

immutable_files:
  - /workspace/test_harness.py
stages: auto
max_retries_per_stage: 3
max_total_hours: 4
