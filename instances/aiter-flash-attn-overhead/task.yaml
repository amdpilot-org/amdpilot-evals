# aiter-flash-attn-overhead: Reduce flash_attn launch overhead
#
# Category: Performance Optimization
# Difficulty: Medium-Hard
# Source: ROCm/aiter Issue #2129

name: aiter-flash-attn-overhead
type: optimize
repo: https://github.com/ROCm/aiter.git
repo_branch: main
base_image: amdpilot-eval-aiter-flash-overhead

model_endpoint:
  model: "qwen-3.5"
  base_url: "http://10.235.24.154:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_aiter_flash
  gpu: "0"
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "Reduce aiter.flash_attn_func launch overhead from ~230us to <100us by fixing JIT module lookup"
  function: "flash_attn_func()"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/aiter-flash-attn-overhead/task_description.md

stages:
  - name: stage1_profile_and_fix
    target_ms: 100
    timeout_s: 3600
    start_image: "amdpilot-eval-aiter-flash-overhead"
    hints: |
      Read the task description at /workspace/task_description.md.
      The issue is in /sgl-workspace/aiter/aiter/jit/core.py.
      First, run the test harness to see the current overhead: /opt/venv/bin/python3 /workspace/test_harness.py
      The JIT dispatch tries get_module(md_name) which ALWAYS fails with ModuleNotFoundError,
      then falls through to the exception handler which succeeds. This exception cycle adds ~150us.
      Fix: eliminate the failing get_module path or cache/skip it.
      After fixing, run the test harness again to verify overhead < 150us.

kimi_cli:
  repo_url: "https://github.com/Arist12/kimi-cli.git"
  branch: amd-dev
  install_dir: "/sgl-workspace/kimi-cli"
  thinking: true
  yolo: true
  ralph_iterations: -1

nudge_agent: oss
supervisor_mode: agent
max_retries_per_stage: 3
max_total_hours: 2

skills_dir: skills
agent_config_dir: agent-config
