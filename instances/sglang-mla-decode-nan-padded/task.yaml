name: sglang-mla-decode-nan-padded
type: bugfix
repo: https://github.com/sgl-project/sglang.git
base_image: amdpilot-eval-sglang-mla-decode-nan-padded

container:
  name: amdpilot_eval_sglang_mla_nan
  gpu: "0,1,2,3"
  shm_size: 64g
  devices: [/dev/kfd, /dev/dri]
  volumes:
    - "/home/yikzhang/huggingface:/root/.cache/huggingface"

workload:
  description: "MLA decode returns unwritten padded rows containing NaN/garbage during speculative decoding on AMD GPUs"
  framework: SGLang

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  metric_max: 100.0
  preflight_timeout: 2700

task:
  description_file: evals/instances/sglang-mla-decode-nan-padded/task_description.md

stages: auto
max_retries_per_stage: 3
max_total_hours: 6
