name: vllm-mxfp4-moe-fallback
type: bugfix
repo: https://github.com/vllm-project/vllm.git
base_image: amdpilot-eval-vllm-mxfp4-moe-fallback
model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"
container:
  name: amdpilot_eval_vllm_mxfp4_moe_fallback
  gpu: "0"
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]
workload:
  description: "See task_description.md"
  framework: PyTorch
benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
task:
  description_file: evals/instances/vllm-mxfp4-moe-fallback/task_description.md
immutable_files: [test_harness.py]
stages: auto
kimi_cli:
  repo_url: "https://github.com/Arist12/kimi-cli.git"
  branch: amd-dev
  install_dir: "/sgl-workspace/kimi-cli"
  thinking: true
  yolo: true
  ralph_iterations: -1
max_retries_per_stage: 3
max_total_hours: 2
