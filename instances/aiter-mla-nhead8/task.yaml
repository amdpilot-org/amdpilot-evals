# aiter-mla-nhead8: Add nhead=8 support for MLA decode via padding
#
# Category: Feature Implementation
# Difficulty: Medium
# Source: ROCm/aiter PR #2138
#
# The agent must implement padding logic in aiter/mla.py to support nhead=8
# by padding to nhead=16 before calling the ASM kernel.
#
# Usage:
#   uv run amdpilot run path/to/amdpilot-evals/instances/aiter-mla-nhead8/task.yaml

name: aiter-mla-nhead8
type: fix
repo: https://github.com/ROCm/aiter.git
repo_branch: main
base_image: rocm/sgl-dev:v0.5.9-rocm720-mi35x-20260226

model_endpoint:
  model: "qwen-3.5"
  base_url: "http://10.235.24.154:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_aiter
  gpu: "0"
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]
  env:
    TOKENIZERS_PARALLELISM: "false"

workload:
  description: "Add nhead=8 support for MLA decode via padding to nhead=16 in AITER"
  function: "mla_decode_fwd()"
  framework: PyTorch

benchmark:
  command: "python3 /workspace/test_harness.py"
  script: ""
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: task_description.md

stages:
  - name: stage1_implement_feature
    target_ms: 100
    timeout_s: 3600
    start_image: null
    hints: |
      Read the task description at /workspace/task_description.md.
      The main file to modify is aiter/mla.py in /workspace/aiter.
      Look at how mla_decode_fwd dispatches between persistent and non-persistent paths.
      When nhead==8 in non-persistent mode, pad q and o tensors from 8 to 16.
      After fixing, run: python3 /workspace/test_harness.py

kimi_cli:
  repo_url: "https://github.com/Arist12/kimi-cli.git"
  branch: amd-dev
  install_dir: "/sgl-workspace/kimi-cli"
  thinking: true
  yolo: true
  ralph_iterations: -1

nudge_agent: oss
supervisor_mode: agent
max_retries_per_stage: 3
max_total_hours: 2



skills_dir: skills
agent_config_dir: agent-config
