name: sglang-kimi-w4a16-moe-dispatch
type: bugfix
repo: https://github.com/sgl-project/sglang.git
base_image: amdpilot-eval-sglang-kimi-w4a16-moe-dispatch

model_endpoint:
  model: "Qwen3.5-397B-A17B"
  base_url: "http://10.235.27.218:30000/v1"
  api_key: "sk-dummy"

supervisor_model_endpoint:
  model: "claude-opus-4-6"
  base_url: "http://localhost:8083/v1"
  api_key: "not-needed"

container:
  name: amdpilot_eval_kimi_w4a16_moe
  gpu: "0"
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "See task_description.md"
  framework: PyTorch

benchmark:
  command: "cd /workspace/sglang && /opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/sglang-kimi-w4a16-moe-dispatch/task_description.md

stages: auto

kimi_cli:
  repo_url: "https://github.com/Arist12/kimi-cli.git"
  branch: amd-dev
  install_dir: "/sgl-workspace/kimi-cli"
  provider: "sglang"
  provider_type: "openai_legacy"
  thinking: false
  yolo: true
  ralph_iterations: -1

max_retries_per_stage: 3
max_total_hours: 2
