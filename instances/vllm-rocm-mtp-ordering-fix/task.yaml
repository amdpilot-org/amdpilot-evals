name: vllm-rocm-mtp-ordering-fix
type: bugfix
repo: https://github.com/vllm-project/vllm.git
base_image: amdpilot-eval-vllm-rocm-mtp-ordering-fix

container:
  name: amdpilot_eval_vllm_mtp_ordering
  gpu: "0"
  shm_size: 64g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "MTP speculative decoding crashes with ROCM_AITER_MLA_SPARSE due to dict iteration order dependency in attention metadata type validation"
  framework: vllm

benchmark:
  command: "/usr/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  metric_max: 100.0

task:
  description_file: evals/instances/vllm-rocm-mtp-ordering-fix/task_description.md

immutable_files: [test_harness.py]

stages: auto
max_retries_per_stage: 3
max_total_hours: 4
