name: sglang-gemm-accuracy-cross-repo
type: bugfix
repo: https://github.com/sgl-project/sglang.git
repo_branch: main
base_image: amdpilot-eval-sglang-gemm-accuracy-cross-repo

model_endpoint:
  model: "Qwen/Qwen3.5-397B-A17B"
  base_url: "http://10.235.24.154:30000/v1"
  api_key: "EMPTY"

kimi_cli:
  thinking: true

container:
  name: amdpilot_gemm_accuracy
  gpu: "0,1,2,3"
  shm_size: 64g
  devices: [/dev/kfd, /dev/dri]
  env:
    TOKENIZERS_PARALLELISM: "false"
    GPU_COREDUMP_ENABLE: "0"
  volumes:
    - "/mnt/dcgpuval/huggingface:/root/.cache/huggingface"
    - "/home/yikzhang/.ssh:/root/.ssh:ro"

workload:
  description: "Fix wrong inference output from FP8 quantized MoE model on sglang"
  function: "sglang.launch_server inference"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  metric_max: 100.0
  output_format: "SCORE: <value>"

task:
  description_file: evals/instances/sglang-gemm-accuracy-cross-repo/task_description.md
  dependency_graph:
    sglang:
      - /sgl-workspace/aiter
      - /sgl-workspace/composable_kernel
    aiter:
      - /sgl-workspace/composable_kernel

immutable_files:
  - /workspace/test_harness.py

stages: auto

max_retries_per_stage: 5
max_total_hours: 6
supervisor: true
nudge: true
frontier_model: true
