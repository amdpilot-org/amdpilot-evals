name: sglang-21614-gibberish-concurrency
type: bugfix
repo: https://github.com/sgl-project/sglang.git
base_image: amdpilot-eval-sglang-21614-gibberish-concurrency

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_sglang_21614_gibberish_concurrency
  gpu: "0,1,2,3"
  shm_size: 64g
  devices: [/dev/kfd, /dev/dri]
  env:
    TOKENIZERS_PARALLELISM: "false"
    GPU_COREDUMP_ENABLE: "0"
  volumes:
    - "/mnt/dcgpuval/huggingface:/root/.cache/huggingface"

workload:
  description: "Fix gibberish output at high batch concurrency >= 32 on MI355X"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  preflight_timeout: 1200
  verify_timeout_min: 1200  # 397B model on TP=4 takes 10-15 min to load

task:
  description_file: evals/instances/sglang-21614-gibberish-concurrency/task_description.md

environment_notes:
  - "L1: The bug only manifests at concurrency >= 32. --disable-overlap-schedule is a known workaround, suggesting the bug is in the overlap scheduling logic (schedule_batch.py / tp_worker_overlap_thread.py)."
  - "L2: Server startup with 397B model takes 10-15 minutes. Do not restart the server repeatedly — make the fix first based on code analysis, then verify once."

stages: auto
supervisor_mode: agent
nudge_agent: oss

kimi_cli:
  repo_url: "https://github.com/Arist12/kimi-cli.git"
  branch: amd-dev
  install_dir: "/sgl-workspace/kimi-cli"
  thinking: true
  yolo: true
  ralph_iterations: -1

max_retries_per_stage: 5
max_total_hours: 4
