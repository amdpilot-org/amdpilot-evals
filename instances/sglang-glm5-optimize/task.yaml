name: sglang-glm5-optimize
type: optimize
repo: https://github.com/Arist12/sglang.git
repo_branch: main
base_image: "rocm/sgl-dev:v0.5.10rc0-rocm720-mi35x-20260406"

model_endpoint:
  model: "Qwen3.5-397B-A17B"
  base_url: "http://localhost:31000/v1"
  api_key: "EMPTY"

kimi_cli:
  thinking: true

container:
  name: amdpilot_glm5
  gpu: "4,5,6,7"
  shm_size: 64g
  devices: [/dev/kfd, /dev/dri]
  env:
    TOKENIZERS_PARALLELISM: "false"
    GPU_COREDUMP_ENABLE: "0"
    SGLANG_DISABLE_CUDNN_CHECK: "1"
  volumes:
    - "/media/NVME/enroot/xiao_sun_qle/hf_cache:/root/.cache/huggingface"

workload:
  description: "Maximize decode throughput for GLM-5 (744B MoE) on AMD MI355X using reduced-layer proxy on single GPU"
  function: "sglang.bench_one_batch"
  framework: PyTorch

benchmark:
  command: "bash /workspace/bench_glm5_proxy.sh"
  script: "evals/instances/sglang-glm5-optimize/bench_glm5_proxy.sh"
  validation_script: "evals/instances/sglang-glm5-optimize/bench_glm5_full.sh"
  metric_name: output_throughput_tok_s
  metric_pattern: 'Output (?:token )?throughput \(tok/s\):\s+([\d.]+)'
  metric_direction: higher
  fixed_params:
    model: zai-org/GLM-5
    tp: 1
    num_layers_proxy: 2
  valid_context_pattern: "tp=1"
  output_format: "Output throughput (tok/s): <value> | tp=1 layers=2 proxy model=GLM-5"

task:
  description_file: evals/instances/sglang-glm5-optimize/task_description.md

stages:
  - name: continuous_optimize
    target_ms: 0
    timeout_s: 28800

max_retries_per_stage: 999
max_total_hours: 72
supervisor_mode: agent
nudge_agent: oss

slack:
  enabled: false
