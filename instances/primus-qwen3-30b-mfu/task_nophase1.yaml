name: primus-qwen3-30b-mfu-nophase1
type: optimize
repo: https://github.com/amdpilot-org/Primus.git
repo_branch: mfu-optimization
base_image: primus-qwen3-30b-mfu-base:v1

# A/B control: same as task.yaml but Phase 1 is disabled. The legacy
# baseline_gate (only fires for score-100 bugfixes) still won't trigger
# for this optimize task, so this is the "today's behaviour" baseline.
frontier_model: true
phase1_baseline: false

model_endpoint:
  model: "Kimi-K2.6"
  base_url: "http://10.235.24.154:30000/v1"
  api_key: "EMPTY"
  allow_env_base_url_override: false
  allow_env_model_override: false

kimi_cli:
  thinking: true
  max_steps_per_turn: 200
  max_retries_per_step: 12
  ralph_iterations: -1

container:
  name: amdpilot_primus_qwen3_mfu_nop1
  gpu: "0,1,2,3,4,5,6,7"
  shm_size: 128g
  devices: [/dev/kfd, /dev/dri]
  env:
    HSA_FORCE_FINE_GRAIN_PCIE: "1"
    TOKENIZERS_PARALLELISM: "false"

workload:
  description: "Maximize Qwen3-30B-A3B MoE pretraining MFU on 8x MI355X (Megatron + Primus + Primus-Turbo)"
  function: "primus.train.pretrain"
  framework: PyTorch

benchmark:
  command: "bash /workspace/bench_mfu.sh"
  script: "evals/instances/primus-qwen3-30b-mfu/bench_mfu.sh"
  metric_name: TFLOPS_PER_GPU
  metric_pattern: 'TFLOPS_PER_GPU:\s+([\d.]+)'
  metric_direction: higher
  preflight_timeout: 1500
  fixed_params:
    model: Qwen3-30B-A3B
    micro_batch_size: 1
    global_batch_size: 8
    seq_length: 8192
    expert_model_parallel_size: 8
    train_iters: 10
  output_format: "TFLOPS_PER_GPU: <value> | mbs=1 gbs=8 seq=8192 ep=8"

# Same minimal contract as the Phase 1 ON variant — the executor sees
# the same starting context (immutable artifacts, gpu shape, base
# image), but no expected_metric / required_flags / active_backends
# because Phase 1 isn't there to populate them.
baseline_contract:
  metric_name: TFLOPS_PER_GPU
  metric_direction: higher
  tolerance: 0.07
  reproduce_command: "bash /workspace/bench_mfu.sh"
  gpu_shape: "8xMI355X"
  base_image: "primus-qwen3-30b-mfu-base:v1"
  immutable_artifacts:
    - /workspace/bench_mfu.sh
    - /workspace/test_harness.py
    - /workspace/primus_train/Primus/scripts/run_qwen3_30b_mfu_baseline.sh

task:
  description_file: evals/instances/primus-qwen3-30b-mfu/task_description.md

stages: auto

max_retries_per_stage: 5
max_total_hours: 3
gpu_required: 8

slack:
  enabled: true
