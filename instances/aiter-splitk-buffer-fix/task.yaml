name: aiter-splitk-buffer-fix
type: bugfix
repo: https://github.com/ROCm/aiter.git
base_image: amdpilot-eval-aiter-splitk-buffer-fix

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_aiter_splitk_buffer_fix
  gpu: "0"
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "MoE intermediate buffer undersized when splitK > 1, causing OOB writes"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/aiter-splitk-buffer-fix/task_description.md

stages: auto
max_retries_per_stage: 3
max_total_hours: 2
