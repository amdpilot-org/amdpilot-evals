name: sglang-qwen35-rope-fix
type: bugfix
repo: https://github.com/sgl-project/sglang.git
base_image: amdpilot-eval-sglang-qwen35-rope-fix

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_qwen35
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "Qwen3.5 fails to start on ROCm with ValueError and ModuleNotFoundError"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/sglang-qwen35-rope-fix/task_description.md

stages: auto

max_retries_per_stage: 3
max_total_hours: 2
