name: sglang-rotary-crash
type: bugfix
repo: https://github.com/sgl-project/sglang.git
base_image: amdpilot-eval-sglang-rotary-crash

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_rotary
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "RotaryEmbedding crashes on ROCm with CUDA_HOME not found error"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/sglang-rotary-crash/task_description.md
  dependency_graph:
    sglang:
      - /sgl-workspace/aiter
      - /sgl-workspace/composable_kernel
    aiter:
      - /sgl-workspace/composable_kernel

immutable_files:
  - /workspace/test_harness.py
stages: auto

max_retries_per_stage: 3
max_total_hours: 2
