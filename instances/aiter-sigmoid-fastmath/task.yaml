name: aiter-sigmoid-fastmath
type: optimize
repo: https://github.com/ROCm/aiter.git
base_image: amdpilot-eval-aiter-sigmoid-fastmath

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_sigmoid
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "Optimize sigmoid activation kernel using AMD hardware intrinsics"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  metric_max: 100.0

task:
  description_file: evals/instances/aiter-sigmoid-fastmath/task_description.md

stages: auto

max_retries_per_stage: 3
max_total_hours: 3
