name: sglang-nsa-tensor-aliasing
type: bugfix
repo: https://github.com/sgl-project/sglang.git
base_image: amdpilot-eval-sglang-nsa-tensor-aliasing

container:
  name: amdpilot_eval_sglang_nsa_tensor_aliasing
  gpu: "0"
  shm_size: 64g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "NSA attention tensor aliasing crash on ROCm — forward_cuda returns in-place-modified tensors causing self-aliased write errors"
  framework: sglang

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  metric_max: 100.0

task:
  description_file: evals/instances/sglang-nsa-tensor-aliasing/task_description.md
  dependency_graph:
    sglang: [/sgl-workspace/aiter, /sgl-workspace/composable_kernel]
    aiter: [/sgl-workspace/composable_kernel]

immutable_files: [test_harness.py]

stages: auto
max_retries_per_stage: 3
max_total_hours: 4
