name: vllm-encoder-rocm
type: bugfix
repo: https://github.com/vllm-project/vllm.git
base_image: amdpilot-eval-vllm-encoder-rocm

model_endpoint:
  model: "qwen-3.5"
  base_url: "http://10.235.24.154:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_vllm_encoder_rocm
  gpu: "0"
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "ROCm attention backends raise NotImplementedError for encoder self-attention"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/vllm-encoder-rocm/task_description.md

stages: auto

max_retries_per_stage: 3
max_total_hours: 2
