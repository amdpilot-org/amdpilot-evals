name: aiter-blockscale-stream-fix
type: bugfix
repo: https://github.com/ROCm/aiter.git
base_image: amdpilot-eval-aiter-blockscale-stream-fix

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_aiter_blockscale_stream
  gpu: "0"
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "FP8 GEMM kernel produces incorrect results on non-default HIP streams"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/aiter-blockscale-stream-fix/task_description.md

stages: auto
max_retries_per_stage: 3
max_total_hours: 2
