name: vllm-rocm-attn-blocksize-qwen35
type: bugfix
repo: https://github.com/vllm-project/vllm.git
base_image: amdpilot-eval-vllm-rocm-attn-blocksize-qwen35

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_vllm_rocm_attn_blocksize_qwen35
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "ROCm Triton attention fallback rejects non-power-of-two multiples of 16 (e.g. Qwen3.5 block size 1056)"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/vllm-rocm-attn-blocksize-qwen35/task_description.md

immutable_files:
  - /workspace/test_harness.py
stages: auto

max_retries_per_stage: 3
max_total_hours: 2
