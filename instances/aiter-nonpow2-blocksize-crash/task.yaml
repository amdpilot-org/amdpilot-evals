name: aiter-nonpow2-blocksize-crash
type: bugfix
repo: https://github.com/ROCm/aiter.git
base_image: amdpilot-eval-aiter-nonpow2-blocksize-crash

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_aiter_nonpow2_blocksize_crash
  gpu: "0"
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "Unified attention crashes on non-power-of-2 block_size inputs"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/aiter-nonpow2-blocksize-crash/task_description.md

immutable_files:
  - /workspace/test_harness.py
stages: auto
max_retries_per_stage: 3
max_total_hours: 2
