name: vllm-aiter-corruption
type: bugfix
repo: https://github.com/vllm-project/vllm.git
repo_branch: main
base_image: amdpilot-eval-vllm-aiter-corruption

model_endpoint:
  model: "Qwen/Qwen3.5-397B-A17B"
  base_url: "http://10.235.24.154:30000/v1"
  api_key: "EMPTY"

container:
  name: amdpilot_eval_vllm_aiter_corruption
  gpu: "0,1,2,3"
  shm_size: 128g
  devices: [/dev/kfd, /dev/dri]
  env:
    TOKENIZERS_PARALLELISM: "false"
    GPU_COREDUMP_ENABLE: "0"
  volumes:
    - "/mnt/dcgpuval/huggingface:/root/.cache/huggingface"

workload:
  description: "Fix corrupted responses when AITER attention and MoE paths are enabled"
  framework: PyTorch

benchmark:
  command: "/usr/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  preflight_timeout: 1200

task:
  description_file: /workspace/task_description.md

stages: auto

kimi_cli:
  repo_url: "https://github.com/Arist12/kimi-cli.git"
  branch: amd-dev
  install_dir: "/sgl-workspace/kimi-cli"
  thinking: true
  yolo: true
  ralph_iterations: -1

max_retries_per_stage: 5
max_total_hours: 8
supervisor_mode: agent
nudge_agent: oss
