name: sglang-kscale-vscale-fix
type: bugfix
repo: https://github.com/sgl-project/sglang.git
base_image: amdpilot-eval-sglang-kscale-vscale-fix

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_kscale_vscale_fix
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "extend_attention_fwd() call missing k_scale and v_scale args in aiter_backend.py"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/sglang-kscale-vscale-fix/task_description.md
  dependency_graph:
    sglang:
      - /sgl-workspace/aiter
      - /sgl-workspace/composable_kernel
    aiter:
      - /sgl-workspace/composable_kernel

stages: auto

max_retries_per_stage: 3
max_total_hours: 1
