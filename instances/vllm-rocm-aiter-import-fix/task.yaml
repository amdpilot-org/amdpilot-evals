name: vllm-rocm-aiter-import-fix
type: bugfix
repo: https://github.com/vllm-project/vllm.git
base_image: amdpilot-eval-vllm-rocm-aiter-import-fix

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_vllm_rocm_aiter_import_fix
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "AITER backend crashes with AttributeError when VLLM_ROCM_USE_AITER=0 and backend is explicitly selected"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/vllm-rocm-aiter-import-fix/task_description.md

stages: auto
max_retries_per_stage: 3
max_total_hours: 2
