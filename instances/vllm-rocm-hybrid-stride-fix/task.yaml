name: vllm-rocm-hybrid-stride-fix
type: bugfix
repo: https://github.com/vllm-project/vllm.git
base_image: amdpilot-eval-vllm-rocm-hybrid-stride-fix

container:
  name: amdpilot_eval_vllm_hybrid_stride
  gpu: "0"
  shm_size: 64g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "Triton KV cache gather kernel uses wrong stride for hybrid model interleaved KV layout, producing NaN/garbage attention outputs"
  framework: vllm

benchmark:
  command: "/usr/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  metric_max: 100.0

task:
  description_file: evals/instances/vllm-rocm-hybrid-stride-fix/task_description.md

immutable_files: [test_harness.py]

stages: auto
max_retries_per_stage: 3
max_total_hours: 4
