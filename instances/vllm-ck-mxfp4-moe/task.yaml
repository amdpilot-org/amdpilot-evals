name: vllm-ck-mxfp4-moe
type: feature
repo: https://github.com/vllm-project/vllm.git
base_image: amdpilot-eval-vllm-ck-mxfp4-moe

model_endpoint:
  base_url: "http://localhost:30000/v1"
  api_key: "sk-dummy"

container:
  name: amdpilot_eval_vllm_ck_mxfp4_moe
  shm_size: 16g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "MXFP4 quantization lacks fused MoE support on ROCm"
  framework: PyTorch

benchmark:
  command: "/opt/venv/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher

task:
  description_file: evals/instances/vllm-ck-mxfp4-moe/task_description.md

immutable_files:
  - /workspace/test_harness.py
stages: auto

max_retries_per_stage: 3
max_total_hours: 2
