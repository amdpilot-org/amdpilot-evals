name: vllm-moe-kernel-gfx950
type: bugfix
repo: https://github.com/vllm-project/vllm.git
base_image: amdpilot-eval-vllm-moe-kernel-gfx950

container:
  name: amdpilot_eval_vllm_moe_gfx950
  gpu: "0"
  shm_size: 64g
  devices: [/dev/kfd, /dev/dri]

workload:
  description: "Multiple MoE kernel test failures on gfx950: FP8 precision, platform gating, test coverage, API type mismatches"
  framework: vLLM

benchmark:
  command: "/usr/bin/python3 /workspace/test_harness.py"
  metric_name: score
  metric_pattern: 'SCORE:\s+([\d.]+)'
  metric_direction: higher
  metric_max: 100.0

task:
  description_file: evals/instances/vllm-moe-kernel-gfx950/task_description.md

stages: auto
max_retries_per_stage: 3
max_total_hours: 4
